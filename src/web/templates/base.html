<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Data Analysis Agent{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="{{ url_for('main.index') }}">
        <span class="brand__icon" aria-hidden="true">📊</span>
        <span class="brand__text">Data Analysis Agent</span>
      </a>
    </div>
  </header>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flashes">
          {% for message in messages %}
            <div class="flash">
              <span class="flash__icon" aria-hidden="true">⚠</span>
              <span>{{ message }}</span>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
